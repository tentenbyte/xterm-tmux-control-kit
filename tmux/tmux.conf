# Enable mouse scrolling and pane/window selection in tmux.
set -g mouse on

# Keep tmux mouse scrolling, but stop tmux from showing its default right-click menus.
unbind-key -n MouseDown3Pane
unbind-key -n MouseDown3Status
unbind-key -n MouseDown3StatusLeft
unbind-key -n M-MouseDown3Pane
unbind-key -n M-MouseDown3Status
unbind-key -n M-MouseDown3StatusLeft
bind-key -n MouseDown3Pane run-shell -b '@HOME@/.local/bin/tmux-open-url #{q:mouse_hyperlink} #{q:mouse_word} #{q:mouse_line}'

# Use 1-based window numbers and switch directly with Alt+number.
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

bind-key -n C-w run-shell -b '@HOME@/.local/bin/tmux-new-codex-cockpit'
bind-key -n M-1 select-window -t :=1
bind-key -n M-2 select-window -t :=2
bind-key -n M-3 select-window -t :=3
bind-key -n M-4 select-window -t :=4
bind-key -n M-5 select-window -t :=5
bind-key -n M-6 select-window -t :=6
bind-key -n M-7 select-window -t :=7
bind-key -n M-8 select-window -t :=8
bind-key -n M-9 select-window -t :=9
bind-key -n M-0 select-window -t :=10

# Switch panes directly with Alt+arrow.
bind-key -n M-Left select-pane -L
bind-key -n M-Right select-pane -R
bind-key -n M-Up select-pane -U
bind-key -n M-Down select-pane -D

# Paste KDE Connect shared text from the X11 clipboard into the current pane.
bind-key C-v run-shell -b '@HOME@/.local/bin/kc-tmux-paste -t "#{pane_id}"'
bind-key -n C-v run-shell -b '@HOME@/.local/bin/kc-tmux-paste -t "#{pane_id}"'
bind-key -n M-v run-shell -b '@HOME@/.local/bin/kc-tmux-paste -t "#{pane_id}"'
bind-key -n F12 run-shell -b '@HOME@/.local/bin/kc-tmux-paste -t "#{pane_id}"'
